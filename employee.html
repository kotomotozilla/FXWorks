<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports — Fraktalex</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f8fa; --ink:#15202b; --muted:#5b6671;
    --line:#e3e7ec; --accent:#2563a8; --accent-ink:#1d4e85; --pos:#1f8a5b; --warn:#c0492e; --amber:#9a6a00;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0 18px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .brand{font-weight:700;letter-spacing:.2px} .brand small{display:block;font-weight:500;color:var(--muted);font-size:12px;letter-spacing:.3px}
  .who{font-size:13px;color:var(--muted);font-family:var(--mono)}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 20px;font-size:14px}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
  input,textarea,select{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px}
  input[type=number]{font-family:var(--mono)} textarea{resize:vertical;min-height:60px}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .btn{display:inline-flex;align-items:center;gap:8px;border:0;cursor:pointer;background:var(--accent);color:#fff;font-size:15px;font-weight:600;font-family:inherit;padding:11px 18px;border-radius:10px}
  .btn:hover{background:var(--accent-ink)} .btn[disabled]{opacity:.5;cursor:default}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--line)} .btn.ghost:hover{border-color:var(--accent)}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:0}
  .card{border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 12px;background:#fff}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px 18px;color:var(--muted);font-size:13px;margin:6px 0 0}
  .card .meta b{color:var(--ink);font-family:var(--mono);font-weight:600}
  .pname{font-size:17px;font-weight:700;margin:0}
  .pcust{color:var(--muted);font-size:13px;margin:2px 0 0}
  .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .tag.done{color:var(--pos);border-color:#bfe3cf;background:#f0faf4}
  .tag.todo{color:var(--accent-ink);border-color:#c7dcef;background:#eef5fb}
  .tag.draft{color:var(--amber);border-color:#e8d6a8;background:#fbf5e6}
  .cardfoot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
  .comment{background:var(--panel);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:10px;color:#2b3742}
  .dash{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:14px 0 18px}
  .dash .cell{background:#fff;padding:12px 14px}
  .dash .k{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
  .dash .v{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:3px}
  .item{border:1px solid var(--line);border-radius:12px;padding:12px;margin:0 0 10px;background:#fff}
  .item .hd{display:flex;justify-content:space-between;align-items:center;margin:0 0 8px}
  .item .hd .n{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .iconbtn{border:0;background:none;color:var(--warn);cursor:pointer;font-size:13px;padding:4px}
  .section-h{font-size:13px;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.4px}
  .hoursbox{max-width:220px}
  .ro-item{padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
  .notice{padding:11px 13px;border-radius:10px;font-size:14px;margin:0 0 14px}
  .notice.err{background:#fcefec;color:var(--warn)} .notice.ok{background:#f0faf4;color:var(--pos)} .notice.info{background:#fbf5e6;color:var(--amber)}
  .empty{color:var(--muted);text-align:center;padding:40px 0}
  .back{background:none;border:0;color:var(--accent);cursor:pointer;font-size:14px;padding:0;margin:0 0 14px}
  .hidden{display:none}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
  .spin.dark{border-color:var(--accent);border-top-color:transparent}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">Fraktalex<small>Report submission</small></div>
    <div class="who" id="who"></div>
  </header>

  <section id="screen-login">
    <h1>Team member sign-in</h1>
    <p class="sub">Enter your work email and the password your administrator gave you.</p>
    <div id="loginErr"></div>
    <label for="email">Email</label>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="name@company.com">
    <div style="height:12px"></div>
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <div style="height:14px"></div>
    <button class="btn" id="loginBtn" onclick="login()">Show my reports</button>
  </section>

  <section id="screen-projects" class="hidden">
    <h1>My projects</h1>
    <p class="sub" id="projSub"></p>
    <div id="projErr"></div>
    <div id="projCards"></div>
  </section>

  <section id="screen-reports" class="hidden">
    <button class="back" onclick="backToProjects()">← Back to projects</button>
    <h1 id="rpTitle">Reports</h1>
    <p class="sub" id="rpSub"></p>
    <div id="reportsErr"></div>
    <div id="reportCards"></div>
  </section>

  <section id="screen-report" class="hidden">
    <button class="back" onclick="backToReports()">← Back to reports</button>
    <h1 id="rName"></h1>
    <p class="sub" id="rMeta"></p>
    <div id="rComment"></div>

    <div class="dash">
      <div class="cell"><div class="k">Rate</div><div class="v" id="dRate">—</div></div>
      <div class="cell"><div class="k">Total hours</div><div class="v" id="dHours">0</div></div>
      <div class="cell"><div class="k">Amount</div><div class="v" id="dAmount">—</div></div>
    </div>

    <p class="section-h">Activities</p>
    <div id="items"></div>
    <button class="btn ghost sm" id="addBtn" onclick="addItem()">+ Add activity</button>

    <div style="height:18px"></div>
    <div class="hoursbox" id="hoursWrap"><label>Total hours spent (all activities) *</label>
      <input id="totalHours" type="number" min="0" step="0.1" placeholder="0" oninput="recalc()"></div>

    <div style="height:14px"></div>
    <div class="hoursbox" id="dateWrap"><label>Submission date</label>
      <input id="submitDate" type="date"></div>

    <div style="height:18px"></div>
    <div id="submitMsg"></div>
    <div class="actions" id="reportActions">
      <button class="btn ghost" id="draftBtn" onclick="saveReport(false)">Save draft</button>
      <button class="btn" id="submitBtn" onclick="saveReport(true)">Submit report</button>
    </div>

    <div id="pdfBlock">
      <div style="height:1px;background:var(--line);margin:18px 0"></div>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink)">
        <input type="checkbox" id="emp_sign" style="width:auto"> Add a signature field at the bottom
      </label>
      <div style="height:10px"></div>
      <button class="btn ghost" id="empPdfBtn" onclick="empPdf()">Download PDF</button>
    </div>
  </section>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIJkaVEjDpadhpaNQWOjVzUMSn-DoF-IfnIYNNLgT-3V_gULgaOf5pVuRkO8T3zEIXmQ/exec';
const SYM = {USD:'$', EUR:'€'};
let STATE = { email:'', password:'', assignments:[], currentProjectId:'', current:null };

async function api(action, payload){
  let res;
  try{
    res = await fetch(APPS_SCRIPT_URL, { method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(Object.assign({action}, payload)) });
  }catch(_){ throw new Error('No connection to the server. Check the URL and your internet connection.'); }
  const text = await res.text();
  let data;
  try{ data = JSON.parse(text); }
  catch(_){
    if(/accounts\.google\.com|Sign in|<html/i.test(text))
      throw new Error('The server returned a Google sign-in page. In the deployment, access must be "Anyone" and the URL must end with /exec.');
    throw new Error('The server returned non-JSON (HTTP '+res.status+'). Check the web app URL.');
  }
  if(!data.ok) throw new Error(data.error || 'Server error');
  return data;
}
// every employee call carries email + password
function auth(extra){ return Object.assign({email:STATE.email, password:STATE.password}, extra||{}); }

const $ = id => document.getElementById(id);
const cur = c => SYM[c] || '$';
const fmtMoney = n => (Math.round((+n||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtH = n => (Math.round((+n||0)*100)/100).toLocaleString('en-US');
function show(id){['screen-login','screen-projects','screen-reports','screen-report'].forEach(s=>$(s).classList.add('hidden'));$(id).classList.remove('hidden');}
function notice(host,type,msg){$(host).innerHTML = msg ? `<div class="notice ${type}">${msg}</div>` : '';}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const COMPANY='Fraktalex Limited';
const BUILD='2026-06-29.1';
function fmtDate(iso){ if(!iso) return ''; try{ const d=new Date(iso); return isNaN(d)?String(iso):d.toISOString().slice(0,10); }catch(e){ return String(iso); } }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function toDate(iso){ try{ const d=new Date(iso); return isNaN(d)?'':d.toISOString().slice(0,10); }catch(e){ return ''; } }

async function login(){
  const email = $('email').value.trim().toLowerCase(), password = $('password').value;
  notice('loginErr','','');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ notice('loginErr','err','Enter a valid email.'); return; }
  if(!password){ notice('loginErr','err','Enter your password.'); return; }
  STATE.email = email; STATE.password = password;
  const btn = $('loginBtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    const r = await api('list_my_assignments', auth());
    $('who').textContent = r.email;
    STATE.assignments = r.assignments||[];
    const aid = new URLSearchParams(location.search).get('aid');
    if(aid){
      const a = STATE.assignments.find(x=>x.AssignmentID===aid);
      if(a) STATE.currentProjectId = a.ProjectID;
      renderProjects(); show('screen-projects');
      openReport(aid);
    }else{
      renderProjects(); show('screen-projects');
    }
  }catch(e){ notice('loginErr','err', esc(e.message)); }
  finally{ btn.disabled=false; btn.textContent='Show my reports'; }
}

async function refreshAssignments(){ try{ const r = await api('list_my_assignments', auth()); STATE.assignments = r.assignments||[]; }catch(_){} }

const BADGE = { released:['todo','New'], draft:['draft','Draft'], submitted:['done','Submitted'] };

function renderProjects(){
  notice('projErr','','');
  const groups = {};
  (STATE.assignments||[]).forEach(a=>{ (groups[a.ProjectID] = groups[a.ProjectID] || {name:a.ProjectName, customer:a.Customer, items:[]}).items.push(a); });
  const ids = Object.keys(groups);
  $('projSub').textContent = ids.length ? `${ids.length} ${ids.length===1?'project':'projects'}` : '';
  if(!ids.length){ $('projCards').innerHTML = '<div class="empty">No projects assigned to you yet.</div>'; return; }
  $('projCards').innerHTML = ids.map(pid=>{
    const g=groups[pid], n=g.items.length, subm=g.items.filter(x=>x.Status==='submitted').length, todo=g.items.filter(x=>x.Status==='released'||x.Status==='draft').length;
    return `<div class="card">
      <div><p class="pname">${esc(g.name)}</p>${g.customer?`<p class="pcust">Customer: ${esc(g.customer)}</p>`:''}</div>
      <div class="meta"><span><b>${n}</b> ${n===1?'report':'reports'}</span>${todo?`<span>${todo} to do</span>`:''}${subm?`<span>${subm} submitted</span>`:''}</div>
      <div class="cardfoot"><span></span><button class="btn sm" onclick="openProject('${pid}')">Open</button></div>
    </div>`;
  }).join('');
}

function openProject(pid){ STATE.currentProjectId = pid; renderReports(pid); show('screen-reports'); window.scrollTo(0,0); }
async function backToProjects(){ await refreshAssignments(); renderProjects(); show('screen-projects'); window.scrollTo(0,0); }
async function backToReports(){ await refreshAssignments(); renderReports(STATE.currentProjectId); show('screen-reports'); window.scrollTo(0,0); }

function renderReports(pid, flash){
  const items = (STATE.assignments||[]).filter(a=>a.ProjectID===pid);
  const g = items[0];
  $('rpTitle').textContent = g ? g.ProjectName : 'Reports';
  $('rpSub').textContent = g && g.Customer ? 'Customer: '+g.Customer : '';
  notice('reportsErr', flash?'ok':'', flash||'');
  if(!items.length){ $('reportCards').innerHTML = '<div class="empty">No reports.</div>'; return; }
  $('reportCards').innerHTML = items.map(a=>{
    const s = cur(a.Currency), b = BADGE[a.Status] || ['todo','—'];
    const label = a.Title ? esc(a.Title) : ('Report · '+fmtDate(a.CreatedAt));
    const btnLabel = a.Status==='submitted' ? 'Open report' : (a.Status==='draft' ? 'Continue' : 'Fill in report');
    const has = (a.ReportedHours!==''&&a.ReportedHours!=null) && (a.Status==='submitted'||a.Status==='draft');
    const amt = (a.ReportedAmount!==''&&a.ReportedAmount!=null) ? +a.ReportedAmount : (+a.ReportedHours||0)*(+a.Rate||0);
    const reported = has ? `<span>Reported: <b>${fmtH(a.ReportedHours)} h · ${s}${fmtMoney(amt)}</b></span>` : '';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:start">
        <div><p class="pname" style="font-size:16px">${label}</p></div>
        <span class="tag ${b[0]}">${b[1]}</span>
      </div>
      <div class="meta"><span>Rate: <b>${s}${fmtMoney(a.Rate)}/h</b></span>${reported}${a.SubmittedAt?`<span>Submitted: <b>${fmtDate(a.SubmittedAt)}</b></span>`:''}</div>
      ${a.Comment?`<div class="comment">💬 ${esc(a.Comment)}</div>`:''}
      <div class="cardfoot"><span></span><button class="btn sm" onclick="openReport('${a.AssignmentID}')">${btnLabel}</button></div>
    </div>`;
  }).join('');
}

async function openReport(aid){
  try{
    const r = await api('get_assignment', auth({assignmentId:aid}));
    STATE.current = r.assignment; const a = r.assignment, s = cur(a.Currency);
    const ro = a.Status==='submitted';
    $('rName').textContent = a.ProjectName;
    $('rMeta').textContent = [a.Title?a.Title:('Report · '+fmtDate(a.CreatedAt)), a.Customer?'Customer: '+a.Customer:'', a.SubmittedAt?'Submitted: '+fmtDate(a.SubmittedAt):''].filter(Boolean).join('   •   ');
    $('rComment').innerHTML = a.Comment ? `<div class="comment">💬 ${esc(a.Comment)}</div>` : '';
    $('dRate').textContent = s+fmtMoney(a.Rate)+'/h';
    notice('submitMsg','','');
    $('items').innerHTML='';
    const existing = (r.items||[]);
    if(ro){
      if(existing.length){ existing.forEach((it,i)=>{ const d=document.createElement('div'); d.className='ro-item'; d.textContent=(i+1)+'. '+it.ActivityDescription; $('items').appendChild(d); }); }
      else { $('items').innerHTML='<div class="muted" style="padding:8px 0">No activities.</div>'; }
      const h=+a.ReportedHours||0; $('dHours').textContent=fmtH(h); $('dAmount').textContent=s+fmtMoney(h*(+a.Rate||0));
    }else{
      if(existing.length){ existing.forEach(it=>addItem(it.ActivityDescription)); } else { addItem(); }
      $('totalHours').value = (a.ReportedHours!==''&&a.ReportedHours!=null) ? a.ReportedHours : '';
      recalc();
    }
    $('submitDate').value = a.SubmittedAt ? toDate(a.SubmittedAt) : todayStr();
    applyMode(ro);
    show('screen-report'); window.scrollTo(0,0);
  }catch(e){ notice('reportsErr','err', esc(e.message)); show('screen-reports'); }
}

function applyMode(ro){
  ['addBtn','reportActions','hoursWrap','dateWrap'].forEach(id=>{ const el=$(id); if(el) el.style.display = ro ? 'none' : ''; });
  if(ro) notice('submitMsg','info','This report has been submitted — it is now read-only. You can still download a PDF below. The administrator can return it to you for corrections.');
}

function addItem(desc=''){
  const div = document.createElement('div'); div.className='item';
  div.innerHTML = `
    <div class="hd"><span class="n"></span>
      <button class="iconbtn" onclick="this.closest('.item').remove();renumber()">Remove</button></div>
    <textarea placeholder="Activity description">${esc(desc)}</textarea>`;
  $('items').appendChild(div); renumber();
}
function renumber(){[...document.querySelectorAll('#items .item')].forEach((el,i)=>{el.querySelector('.n').textContent='Activity '+(i+1);});}

function recalc(){
  const a = STATE.current; if(!a) return;
  const rate = +a.Rate||0, s = cur(a.Currency);
  const hours = parseFloat(($('totalHours').value||'').replace(',','.'))||0;
  $('dHours').textContent = fmtH(hours);
  $('dAmount').textContent = s+fmtMoney(hours*rate);
}

async function saveReport(finalize){
  const activities = [...document.querySelectorAll('#items .item textarea')].map(t=>t.value.trim()).filter(Boolean);
  const hours = parseFloat(($('totalHours').value||'').replace(',','.'))||0;
  if(finalize && (!activities.length || hours<=0)){ notice('submitMsg','err','Add at least one activity and the total hours before submitting.'); return; }

  const action = finalize ? 'submit_report' : 'save_draft';
  const btn = finalize ? $('submitBtn') : $('draftBtn');
  const other = finalize ? $('draftBtn') : $('submitBtn');
  const oldText = btn.textContent; btn.disabled=true; other.disabled=true;
  btn.innerHTML = `<span class="spin ${finalize?'':'dark'}"></span>`;
  try{
    const r = await api(action, auth({assignmentId:STATE.current.AssignmentID, activities, hours, submittedDate:$('submitDate').value}));
    const s = cur(STATE.current.Currency);
    if(finalize){
      const msg = `Report submitted: ${r.totals.activities} activities, ${fmtH(r.totals.hours)} h for ${s}${fmtMoney(r.totals.amount)}. The admin has been notified.`;
      await refreshAssignments();
      renderReports(STATE.currentProjectId, msg);
      show('screen-reports'); window.scrollTo(0,0);
    }else{
      STATE.current.Status='draft';
      notice('submitMsg','info', `Draft saved. You can continue later.`);
    }
  }catch(e){ notice('submitMsg','err', esc(e.message)); }
  finally{ btn.disabled=false; other.disabled=false; btn.textContent=oldText; }
}

function buildReportHtml(a, activities, hours, withSign, dateStr){
  const submitted = dateStr ? fmtDate(dateStr) : (a.SubmittedAt ? fmtDate(a.SubmittedAt) : '');
  const list = (activities && activities.length)
    ? '<ol>'+activities.map(x=>`<li>${esc(x)}</li>`).join('')+'</ol>'
    : '<span style="color:#777">—</span>';
  const sign = withSign ? `
    <div class="sign">
      <div class="cap">Performed by:</div>
      <div class="srow">
        <div class="scell"><div class="sname">${esc(a.EmployeeName||a.EmployeeEmail)}</div><div class="sline">Name</div></div>
        <div class="scell"><div class="sname">&nbsp;</div><div class="sline">Signature</div></div>
        <div class="scell"><div class="sname">${submitted||'&nbsp;'}</div><div class="sline">Date</div></div>
      </div>
    </div>` : '';
  return `<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Project Work Completion Report</title>
<style>
  @page{ margin:20mm 18mm; }
  *{box-sizing:border-box}
  body{font-family:'Times New Roman',Georgia,serif;color:#111;font-size:12pt;margin:0;padding:24px}
  .no-print{margin:0 0 18px}
  .no-print button{font:600 14px system-ui;padding:9px 18px;border:0;background:#2563a8;color:#fff;border-radius:8px;cursor:pointer}
  .lh{display:flex;justify-content:space-between;font-size:9pt;color:#444;border-bottom:1px solid #999;padding-bottom:6px;margin-bottom:22px;letter-spacing:.4px;text-transform:uppercase;font-family:Arial,Helvetica,sans-serif}
  h1{text-align:center;font-size:15pt;margin:0 0 18px}
  table{width:100%;border-collapse:collapse}
  td{border:1px solid #333;padding:8px 10px;vertical-align:top}
  td.label{width:44%;font-weight:bold;background:#f2f2f2}
  ol{margin:2px 0 2px 18px;padding:0} li{margin:3px 0}
  .foot{margin-top:26px;text-align:center;font-size:9pt;color:#555;letter-spacing:1px;font-family:Arial,Helvetica,sans-serif}
  .sign{margin-top:44px} .sign .cap{font-size:10pt;margin-bottom:22px}
  .srow{display:flex;gap:36px} .scell{flex:1}
  .sname{min-height:22px;border-bottom:1px solid #333;padding-bottom:3px}
  .sline{font-size:9pt;color:#555;margin-top:3px;font-family:Arial,Helvetica,sans-serif}
  @media print{ .no-print{display:none} body{padding:0} }
</style></head><body>
  <div class="no-print"><button onclick="window.print()">Print / Save as PDF</button></div>
  <div class="lh"><span>${esc(COMPANY)}</span><span>Project Work Completion Report</span></div>
  <h1>Project Work Completion Report</h1>
  <table>
    <tr><td class="label">Project:</td><td>${esc(a.ProjectName||'')}</td></tr>
    <tr><td class="label">Customer:</td><td>${esc(a.Customer||'')}</td></tr>
    <tr><td class="label" colspan="2">A brief description and a list of completed tasks for the project:</td></tr>
    <tr><td colspan="2">${list}</td></tr>
    <tr><td class="label">The total number of hours spent:</td><td>${fmtH(hours)}</td></tr>
    <tr><td class="label">Report date:</td><td>${submitted||'&nbsp;'}</td></tr>
  </table>
  ${sign}
  <div class="foot">CONFIDENTIAL</div>
  <script>setTimeout(function(){try{window.print();}catch(e){}},500);<\/script>
</body></html>`;
}

function empPdf(){
  const a=STATE.current; if(!a) return;
  let activities, hours, dateStr;
  if(a.Status==='submitted'){
    activities=[...document.querySelectorAll('#items .ro-item')].map(d=>d.textContent.replace(/^\d+\.\s*/,'')).filter(Boolean);
    hours=+a.ReportedHours||0; dateStr=a.SubmittedAt||'';
  }else{
    activities=[...document.querySelectorAll('#items textarea')].map(t=>t.value.trim()).filter(Boolean);
    hours=parseFloat(($('totalHours').value||'').replace(',','.'))||0; dateStr=$('submitDate').value||'';
  }
  const html=buildReportHtml(a, activities, hours, $('emp_sign').checked, dateStr);
  const w=window.open('','_blank');
  if(!w){ notice('submitMsg','err','Allow pop-ups to generate the PDF.'); return; }
  w.document.open(); w.document.write(html); w.document.close();
}

(function init(){
  const sm=document.querySelector('.brand small'); if(sm) sm.textContent += ' · v'+BUILD;
  const p = new URLSearchParams(location.search), em = p.get('email');
  if(em){ $('email').value = em; }
  if(APPS_SCRIPT_URL.startsWith('PASTE')){ notice('loginErr','err','APPS_SCRIPT_URL is not configured in employee.html.'); }
})();
</script>
